<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title" tr>TavLite</title>
    <link rel="icon" type="image/x-icon" href="/img/logo.png">
    <link rel="stylesheet" href="/css/home.css">
    <script src="/js/i18n.js"></script>
    <script src="/js/toast.js"></script>
</head>

<body>
    <div class="home-page">
        <div class="home-header">
            <h1>TavLite</h1>
            <h2>Free</h2>
            <input type="text" id="search-input" class="home-search-input" placeholder="Search" tr-input>
            <button id="settings-button" title="Settings" tr-title>
                <svg>
                    <use xlink:href="/img/icons.svg?v=200#icon-settings"></use>
                </svg>
            </button>
        </div>
        <div class="card-grid" id="card-grid"></div>
        <div class="pagination" id="pagination"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const authRes = await fetch('/api/auth/check');
                const authData = await authRes.json();
                if (!authData.authenticated && authData.password_enabled) {
                    window.location.href = '/login?redirect=/';
                    return;
                }
            } catch (e) { }
            await i18n.init("index", i18n.getBrowserLanguage());
        });
    </script>

    <script>
        const fetchJson = async url => { try { const r = await fetch(url); if (!r.ok) return {}; const d = await r.json(); return d && typeof d == 'object' && !Array.isArray(d) ? d : {} } catch { return {} } };

        const PAGE_SIZE = 20;
        let allCards = {};
        let filteredNames = [];
        let currentPage = 1;
        const imageCache = {};

        const renderPagination = (totalPages) => {
            const pagination = document.getElementById('pagination');
            pagination.innerHTML = '';

            if (totalPages <= 1) return;

            const prevBtn = document.createElement('button');
            prevBtn.innerHTML = '<svg><use xlink:href="/img/icons.svg?v=200#icon-left"></use></svg>';
            prevBtn.disabled = currentPage === 1;
            prevBtn.addEventListener('click', () => {
                if (currentPage > 1) {
                    currentPage--;
                    renderCards();
                }
            });
            pagination.appendChild(prevBtn);

            const pageInfo = document.createElement('span');
            pageInfo.className = 'page-info';
            pageInfo.textContent = currentPage + ' / ' + totalPages;
            pagination.appendChild(pageInfo);

            const nextBtn = document.createElement('button');
            nextBtn.innerHTML = '<svg><use xlink:href="/img/icons.svg?v=200#icon-right"></use></svg>';
            nextBtn.disabled = currentPage === totalPages;
            nextBtn.addEventListener('click', () => {
                if (currentPage < totalPages) {
                    currentPage++;
                    renderCards();
                }
            });
            pagination.appendChild(nextBtn);
        };

        const loadCardImage = async (name, cardEl) => {
            if (imageCache[name]) {
                const placeholder = cardEl.querySelector('.home-card-placeholder');
                if (!placeholder) return;
                const img = document.createElement('img');
                img.className = 'home-card-image';
                img.src = imageCache[name];
                img.alt = name;
                placeholder.replaceWith(img);
                return;
            }
            try {
                const response = await fetch('/api/cards/' + encodeURIComponent(name) + '?field=concept_art&t=' + Date.now());
                if (!response.ok) return;
                const data = await response.json();
                const art = data?.concept_art;
                if (art && typeof art === 'string' && art.startsWith('data:')) {
                    imageCache[name] = art;
                    const placeholder = cardEl.querySelector('.home-card-placeholder');
                    if (!placeholder) return;
                    const img = document.createElement('img');
                    img.className = 'home-card-image';
                    img.src = art;
                    img.alt = name;
                    placeholder.replaceWith(img);
                }
            } catch (e) {
                console.error('Failed to load image for', name);
            }
        };

        const renderCards = () => {
            const grid = document.getElementById('card-grid');
            grid.innerHTML = '';

            const start = (currentPage - 1) * PAGE_SIZE;
            const pageNames = filteredNames.slice(start, start + PAGE_SIZE);

            if (pageNames.length === 0) {
                const emptyDiv = document.createElement('div');
                emptyDiv.className = 'home-empty';
                const span = document.createElement('span');
                span.textContent = i18n.tr('No character cards found');
                emptyDiv.appendChild(span);
                grid.appendChild(emptyDiv);
                document.getElementById('pagination').innerHTML = '';
                return;
            }

            const fragment = document.createDocumentFragment();
            pageNames.forEach(name => {
                const cardEl = document.createElement('div');
                cardEl.className = 'home-card';
                cardEl.addEventListener('click', () => {
                    window.open('/chat?card=' + encodeURIComponent(name), '_blank');
                });

                const placeholder = document.createElement('div');
                placeholder.className = 'home-card-placeholder';
                placeholder.textContent = "";
                cardEl.appendChild(placeholder);

                const title = document.createElement('div');
                title.className = 'home-card-title';
                title.textContent = name;
                title.title = name;
                cardEl.appendChild(title);

                fragment.appendChild(cardEl);

                loadCardImage(name, cardEl);
            });
            grid.appendChild(fragment);

            const totalPages = Math.ceil(filteredNames.length / PAGE_SIZE);
            renderPagination(totalPages);
        };

        document.addEventListener('DOMContentLoaded', async () => {
            allCards = await fetchJson('/api/cards?t=' + Date.now());
            filteredNames = Object.entries(allCards)
                .sort((a, b) => (b[1]?.updated_at || 0) - (a[1]?.updated_at || 0))
                .map(([name]) => name);
            renderCards();

            document.getElementById('search-input').addEventListener('input', function () {
                const query = this.value.trim().toLowerCase();
                filteredNames = Object.keys(allCards).filter(name =>
                    name.toLowerCase().includes(query)
                );
                currentPage = 1;
                renderCards();
            });
        });
    </script>

    <script>
        document.getElementById('settings-button').addEventListener('click', () => {
            window.location.href = '/settings';
        });
    </script>
</body>

</html>
